version: '3.8'

services:
  oauth-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    env_file:
      - .env
    volumes:
      # Mount source code for development (hot reload with nodemon)
      - ./server.js:/app/server.js
      - ./public:/app/public
      # Don't overwrite node_modules
      - /app/node_modules
    restart: unless-stopped