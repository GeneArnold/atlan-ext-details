<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlan External Details Tab</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }

        .header h1 {
            color: #3366FF;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #6c757d;
            font-size: 14px;
        }

        .info-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #3366FF;
        }

        .info-section h2 {
            color: #495057;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .info-section h2 .icon {
            margin-right: 10px;
            font-size: 20px;
        }

        .data-field {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
        }

        .data-field .label {
            font-weight: 600;
            color: #6c757d;
            min-width: 150px;
            font-size: 14px;
        }

        .data-field .value {
            color: #2c3e50;
            font-size: 14px;
            word-break: break-word;
            flex: 1;
        }

        .data-field .value.mono {
            font-family: 'Courier New', Courier, monospace;
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .loading .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3366FF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fef2f2;
            border-left-color: #dc3545;
            color: #dc3545;
        }

        .error h2 {
            color: #dc3545;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #e7f5ff;
            color: #3366FF;
        }

        .status.authenticated {
            background: #d4edda;
            color: #155724;
        }

        .env-info {
            margin-top: 30px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
            font-size: 12px;
        }

        .env-info h3 {
            color: #856404;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>External Details Tab</h1>
            <p>Atlan Asset Information Display</p>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Initializing Atlan connection...</p>
            </div>
        </div>
    </div>

    <!-- Load Atlan Auth SDK -->
    <script src="https://unpkg.com/@atlanhq/atlan-auth@latest/dist/atlan-auth.umd.min.js"></script>

    <script>
        // Get Atlan Auth SDK
        const { AtlanAuth } = window.AtlanAuthSDK;

        // Configuration - Atlan instance where this tab will be installed
        const ATLAN_INSTANCE_URL = 'https://fs3.atlan.com';

        // Use relative path for API (same domain in production)
        const BACKEND_URL = '';  // Empty means same domain

        // Store auth context
        let authContext = null;
        let atlanClient = null;
        let assetGuidFromMessage = null;  // Store GUID from raw postMessage

        // Listen for raw postMessages to capture asset GUID
        window.addEventListener('message', (event) => {
            // Only accept messages from Atlan
            if (event.origin !== ATLAN_INSTANCE_URL) return;

            const { type, payload } = event.data || {};

            // Capture ATLAN_AUTH_CONTEXT message for asset GUID
            if (type === 'ATLAN_AUTH_CONTEXT') {
                console.log('[ATLAN] Raw ATLAN_AUTH_CONTEXT received:', payload);

                // Extract asset GUID from page context
                if (payload?.page?.params?.id) {
                    assetGuidFromMessage = payload.page.params.id;
                    console.log('[ATLAN] ✅ Asset GUID captured from postMessage:', assetGuidFromMessage);
                } else {
                    console.log('[ATLAN] ⚠️ No asset GUID in page context:', payload?.page);
                }
            }
        });

        /**
         * Initialize Atlan Auth SDK
         */
        function initializeAtlan() {
            console.log('[ATLAN] Initializing Auth SDK...');
            console.log('[ATLAN] Instance URL:', ATLAN_INSTANCE_URL);
            console.log('[ATLAN] Current URL:', window.location.href);

            const atlan = new AtlanAuth({
                origin: ATLAN_INSTANCE_URL,

                onReady: (context) => {
                    console.log('[ATLAN] ✅ Authentication successful!', context);
                    authContext = context;
                    atlanClient = atlan;
                    displayAuthenticatedContent();
                },

                onError: (error) => {
                    console.error('[ATLAN] ❌ Authentication failed:', error);
                    displayError(error.message || 'Authentication failed');
                },

                debug: true
            });

            atlan.init();
        }

        /**
         * Display content after authentication
         */
        async function displayAuthenticatedContent() {
            // User object from Atlan OAuth actually contains:
            // - userId: User's unique identifier
            // - username: User's email address (e.g., "gene.arnold@atlan.com")
            // - workspaceRole: User's role (e.g., "$admin")
            // - assignedRole: Object with role details
            // - permissions: Array of permission strings
            // Note: No separate email or name fields provided
            const user = authContext.user;
            const mode = authContext.mode;
            const token = authContext.token || atlanClient.getToken();

            // Asset GUID - use the one captured from raw postMessage
            let assetGuid = null;
            if (mode === 'embedded') {
                // In embedded mode, use GUID captured from ATLAN_AUTH_CONTEXT message
                assetGuid = assetGuidFromMessage;
                console.log('[ATLAN] Using asset GUID from postMessage:', assetGuid);
            } else {
                // In standalone mode, get from page context (if available)
                assetGuid = authContext.page?.params?.id || null;
            }

            console.log('[ATLAN] Mode:', mode);
            console.log('[ATLAN] Asset GUID:', assetGuid);
            console.log('[ATLAN] Page context:', authContext.page);
            console.log('[ATLAN] Page params:', authContext.page?.params);
            console.log('[ATLAN] User object received:', user);
            console.log('[ATLAN] User fields:', {
                userId: user?.userId || 'undefined',
                username: user?.username || 'undefined',
                workspaceRole: user?.workspaceRole || 'undefined',
                profileRole: user?.profileRole || 'undefined',
                assignedRole: user?.assignedRole?.name || 'undefined'
            });
            console.log('[ATLAN] Full authContext:', authContext);

            let contentHTML = `
                <div class="info-section">
                    <h2><span class="icon">🔐</span> Authentication Status</h2>
                    <div class="data-field">
                        <span class="label">Status:</span>
                        <span class="value"><span class="status authenticated">Authenticated</span></span>
                    </div>
                    <div class="data-field">
                        <span class="label">Mode:</span>
                        <span class="value">${mode}</span>
                    </div>
                    <div class="data-field">
                        <span class="label">Environment:</span>
                        <span class="value">${window.location.hostname}</span>
                    </div>
                </div>

                <div class="info-section">
                    <h2><span class="icon">👤</span> User Information (OAuth Handshake Data)</h2>
                    <div class="data-field">
                        <span class="label">User ID:</span>
                        <span class="value mono">${user?.userId || user?.id || 'N/A'}</span>
                    </div>
                    <div class="data-field">
                        <span class="label">Username:</span>
                        <span class="value">${user?.username || 'N/A'}</span>
                    </div>
                    ${user?.email ? `
                    <div class="data-field">
                        <span class="label">Email:</span>
                        <span class="value">${user.email}</span>
                    </div>
                    ` : ''}
                    ${user?.name ? `
                    <div class="data-field">
                        <span class="label">Display Name:</span>
                        <span class="value">${user.name}</span>
                    </div>
                    ` : ''}
                    ${user?.workspaceRole ? `
                    <div class="data-field">
                        <span class="label">Workspace Role:</span>
                        <span class="value">${user.workspaceRole}</span>
                    </div>
                    ` : ''}
                    ${user?.assignedRole ? `
                    <div class="data-field">
                        <span class="label">Assigned Role:</span>
                        <span class="value">${user.assignedRole.name || user.assignedRole} ${user.assignedRole.description ? `(${user.assignedRole.description})` : ''}</span>
                    </div>
                    ` : ''}
                    ${user?.profileRole ? `
                    <div class="data-field">
                        <span class="label">Profile Role:</span>
                        <span class="value">${user.profileRole}</span>
                    </div>
                    ` : ''}
                    ${user?.designation ? `
                    <div class="data-field">
                        <span class="label">Designation:</span>
                        <span class="value">${user.designation}</span>
                    </div>
                    ` : ''}
                    ${user?.groups?.length > 0 ? `
                    <div class="data-field">
                        <span class="label">Groups:</span>
                        <span class="value">${user.groups.join(', ')}</span>
                    </div>
                    ` : ''}
                    ${user?.permissions?.length > 0 ? `
                    <div class="data-field">
                        <span class="label">Permission Count:</span>
                        <span class="value"><strong style="color: #3366FF;">${user.permissions.length}</strong> permissions</span>
                    </div>
                    ` : ''}
                    ${user?.roles?.length > 0 ? `
                    <div class="data-field">
                        <span class="label">Role Count:</span>
                        <span class="value"><strong style="color: #3366FF;">${user.roles.length}</strong> roles assigned</span>
                    </div>
                    ` : ''}
                </div>

                ${mode === 'embedded' ? `
                <div class="info-section" style="background: #e7f5ff; border-left-color: #3366FF;">
                    <h2><span class="icon">🐛</span> Debug: Embedded Mode Data</h2>
                    <div class="data-field">
                        <span class="label">authContext keys:</span>
                        <span class="value mono" style="font-size: 11px;">${Object.keys(authContext || {}).join(', ')}</span>
                    </div>
                    <div class="data-field">
                        <span class="label">user keys:</span>
                        <span class="value mono" style="font-size: 11px;">${Object.keys(user || {}).join(', ')}</span>
                    </div>
                    <div class="data-field">
                        <span class="label">iframe URL:</span>
                        <span class="value mono" style="font-size: 10px; word-break: break-all;">${window.location.href}</span>
                    </div>
                    <div class="data-field">
                        <span class="label">URL search params:</span>
                        <span class="value mono" style="font-size: 11px;">${window.location.search || 'none'}</span>
                    </div>
                    <div class="data-field">
                        <span class="label">URL hash:</span>
                        <span class="value mono" style="font-size: 11px;">${window.location.hash || 'none'}</span>
                    </div>
                    <div class="data-field">
                        <span class="label">Asset GUID Source:</span>
                        <span class="value" style="color: ${assetGuidFromMessage ? '#28a745' : '#dc3545'};">
                            ${assetGuidFromMessage ? 'Captured from ATLAN_AUTH_CONTEXT' : 'Not received in postMessage'}
                        </span>
                    </div>
                    <div class="data-field" style="background: #fff3cd; padding: 10px; margin-top: 10px; border-radius: 4px;">
                        <span style="color: #856404; font-weight: bold;">ℹ️ SDK Implementation Notes:</span><br>
                        <span style="color: #856404; font-size: 12px;">
                            • Asset GUID is in raw ATLAN_AUTH_CONTEXT message (payload.page.params.id)<br>
                            • Atlan Auth SDK strips page context in embedded mode<br>
                            • Using raw postMessage listener to capture GUID before SDK processes it<br>
                            • User data structure differs between modes (see above)
                        </span>
                    </div>
                </div>
                ` : ''}

                <div class="info-section">
                    <h2><span class="icon">📄</span> Asset Information</h2>
                    <div class="data-field">
                        <span class="label">Asset GUID:</span>
                        <span class="value mono">${assetGuid || 'Not available (not in asset context)'}</span>
                    </div>
                    <div id="asset-details">
                        ${assetGuid ? '<div class="data-field"><span class="label">Loading details...</span></div>' : ''}
                    </div>
                </div>
            `;

            // Add environment info for debugging
            if (mode === 'standalone' || window.location.hostname.includes('localhost')) {
                contentHTML += `
                    <div class="env-info">
                        <h3>📍 Deployment Info</h3>
                        <div>URL: ${window.location.href}</div>
                        <div>Mode: ${mode}</div>
                        <div>To use as Atlan tab, add this URL in Atlan's external tab configuration</div>
                    </div>
                `;
            }

            document.getElementById('content').innerHTML = contentHTML;

            // Fetch asset details if we have a GUID
            if (assetGuid && mode === 'embedded') {
                await fetchAssetDetails(assetGuid, token);
            }
        }

        /**
         * Fetch asset details from backend
         */
        async function fetchAssetDetails(guid, token) {
            console.log('[ATLAN] Fetching asset details for:', guid);

            try {
                const response = await fetch(`${BACKEND_URL}/api/asset/${guid}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Backend returned ${response.status}`);
                }

                const assetData = await response.json();
                console.log('[ATLAN] Asset data received:', assetData);

                document.getElementById('asset-details').innerHTML = `
                    <div class="data-field">
                        <span class="label">Name:</span>
                        <span class="value">${assetData.name || 'N/A'}</span>
                    </div>
                    <div class="data-field">
                        <span class="label">Type:</span>
                        <span class="value">${assetData.type_name || 'N/A'}</span>
                    </div>
                    <div class="data-field">
                        <span class="label">Description:</span>
                        <span class="value">${assetData.description || 'No description available'}</span>
                    </div>
                    <div class="data-field">
                        <span class="label">Qualified Name:</span>
                        <span class="value mono" style="font-size: 10px;">${assetData.qualified_name || 'N/A'}</span>
                    </div>
                `;

            } catch (error) {
                console.error('[ATLAN] Failed to fetch asset details:', error);
                document.getElementById('asset-details').innerHTML = `
                    <div class="data-field">
                        <span class="label">Error:</span>
                        <span class="value" style="color: #dc3545;">
                            Failed to load asset details: ${error.message}
                        </span>
                    </div>
                `;
            }
        }

        /**
         * Display error message
         */
        function displayError(message) {
            document.getElementById('content').innerHTML = `
                <div class="info-section error">
                    <h2><span class="icon">❌</span> Error</h2>
                    <p>${message}</p>
                    <p style="margin-top: 15px; font-size: 12px;">
                        If this is a redirect_uri error, the app needs to be registered in Atlan.
                    </p>
                    <p style="margin-top: 10px; font-size: 12px;">
                        Current URL: ${window.location.href}
                    </p>
                </div>
            `;
        }

        // Start the application
        console.log('[ATLAN] Starting application...');
        initializeAtlan();
    </script>
</body>
</html>
